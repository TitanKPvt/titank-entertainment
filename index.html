<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon.png" sizes="96x96" type="image/png" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://titank-entertainment.in/" />

    <title>TitanK Entertainment - Premier Event Management</title>

    <meta name="description" content="TitanK Entertainment specializes in world-class concerts and live entertainment experiences. Premier event management services in Bengaluru, India." />

    <!-- Open Graph -->
    <meta property="og:title" content="TitanK Entertainment - Premier Event Management">
    <meta property="og:description" content="World-class concerts, live entertainment, and premium event management experiences.">
    <meta property="og:url" content="https://titank-entertainment.in/">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://titank-entertainment.in/logo.png">

    <!-- Hide fallback text from users -->
    <style>
      #seo-content {
        display: none;
      }
    </style>

    <!-- Organization Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TitanK Entertainment",
      "alternateName": "TitanK",
      "url": "https://titank-entertainment.in",
      "logo": "https://titank-entertainment.in/logo.png"
    }
    </script>
  </head>

  <body>

    <!-- Hidden SEO content for crawlers -->
    <div id="seo-content">
      <h1>TitanK Entertainment</h1>
      <p>
        TitanK Entertainment is a premier event management company specializing
        in concerts, live shows, and world-class entertainment experiences in
        Bengaluru, India.
      </p>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

  </body>
</html>
